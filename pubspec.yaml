name: chess_room
description: A Flutter chess app.
version: 1.0.6+6

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flame: ^1.16.0
  url_launcher: ^6.2.4
  audioplayers: ^5.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  async: ^2.11.0

  in_app_review: ^2.0.9
  google_mobile_ads: ^4.0.0
  app_tracking_transparency: ^2.0.4
  open_store: ^0.2.4
  win32: ^5.13.0


dev_dependencies:
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1
  intl_utils: ^2.8.5

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"


# The following section is specific to Flutter.
flutter:
  fonts:
    - family: DancingScript
      fonts:
        - asset: fonts/DancingScript-Regular.ttf
        - asset: fonts/DancingScript-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Bold.ttf
          weight: 700

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
  assets:
    - assets/
    - assets/app_icons/
    - assets/images/
    - assets/images/pieces/classic/
    - assets/images/pieces/letters/
    - assets/images/pieces/angular/
    - assets/images/pieces/8-bit/
    - assets/images/pieces/videochess/
    - assets/images/pieces/lewischessmen/
    - assets/images/pieces/mexicocity/
    - assets/audio/piece_moved.mp3
flutter_intl:
  enabled: true