name: chess_room
description: A Flutter chess app.
version: 1.0.6+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  flame: ^1.30.1
  url_launcher: ^6.3.0
  audioplayers: ^6.8.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  async: ^2.13.0

  in_app_review: ^2.0.12
  google_mobile_ads: ^5.2.0
  app_tracking_transparency: ^2.0.7
  open_store: ^0.5.0
  win32: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  intl_utils: ^2.8.16

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"

# The following section is specific to Flutter.
flutter:
  fonts:
    - family: DancingScript
      fonts:
        - asset: fonts/DancingScript-Regular.ttf
        - asset: fonts/DancingScript-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Bold.ttf
          weight: 700

  uses-material-design: true

  assets:
    - assets/
    - assets/app_icons/
    - assets/images/
    - assets/images/pieces/classic/
    - assets/images/pieces/letters/
    - assets/images/pieces/angular/
    - assets/images/pieces/8-bit/
    - assets/images/pieces/videochess/
    - assets/images/pieces/lewischessmen/
    - assets/images/pieces/mexicocity/
    - assets/audio/piece_moved.mp3

flutter_intl:
  enabled: true
